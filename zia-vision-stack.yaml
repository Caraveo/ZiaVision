AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy ZiaVision on AWS with Auto Deploy from GitHub

Parameters:
  GitHubRepo:
    Type: String
    Default: "Caraveo/ZiaVision"
    Description: GitHub repository for the project

  InstanceType:
    Type: String
    Default: "t3.micro"
    Description: EC2 instance type

  KeyPairName:
    Type: String
    Default: "VisionKey"
    Description: Name of the key pair for SSH access

Resources:
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP/HTTPS/SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  ZiaInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: ami-01b3c7a0a3ef1741f  # Amazon Linux 2 AMI in us-west-2
      KeyName: !Ref KeyPairName
      SecurityGroups:
        - !Ref WebServerSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: ZiaVision-Instance
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          sudo yum update -y
          sudo yum install -y git docker jq
          sudo systemctl start docker
          sudo systemctl enable docker
          sudo usermod -aG docker ec2-user

          # Install Docker Compose
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-\$(uname -s)-\$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

          # Clone repository
          cd /home/ubuntu
          git clone "https://github.com/${GitHubRepo}.git"
          cd ZiaVision

          # Build and deploy the application
          sudo docker compose pull
          sudo docker compose down --remove-orphans
          sudo docker compose up -d --build

          # Enable automatic updates (optional)
          echo "*/5 * * * * cd /home/ubuntu/ZiaVision && git pull && sudo docker-compose up -d --build" | crontab -

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref EC2Role

Outputs:
  InstancePublicDNS:
    Description: Public DNS name of the EC2 instance
    Value: !GetAtt ZiaInstance.PublicDnsName

  SSHCommand:
    Description: Command to SSH into the instance
    Value: !Sub "ssh -i VisionKey.pem ec2-user@${ZiaInstance.PublicDnsName}"

  WebsiteURL:
    Description: URL to access the website
    Value: !Sub "http://${ZiaInstance.PublicDnsName}"
