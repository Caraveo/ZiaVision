name: Deploy to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-west-2
  EC2_HOST: 54.191.69.51

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Build React app
        run: |
          cd client
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ env.EC2_HOST }}
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          
          # Copy the built files to EC2
          scp -o StrictHostKeyChecking=no -i private_key.pem -r client/build/* ec2-user@$HOST:/var/www/ziavision/
          
          # Restart nginx
          ssh -o StrictHostKeyChecking=no -i private_key.pem ec2-user@$HOST 'sudo systemctl restart nginx'
          
          rm -f private_key.pem 