services:
  web:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./client/public/videos:/usr/share/nginx/html/videos
      - ./client/public/PITCH:/usr/share/nginx/html/PITCH
    networks:
      - ziavision-network

networks:
  ziavision-network:
    driver: bridge

volumes:
  mongodb_data: 