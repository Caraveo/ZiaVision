AWSTemplateFormatVersion: 2010-09-09
Description: Simple EC2 instance deployment for ZiaVision

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0261755bbcb8c4a84    # Ubuntu 22.04 LTS
    us-east-2:
      AMI: ami-024e6efaf93d85776
    us-west-1:
      AMI: ami-0f8e81a3da6e2510a
    us-west-2:
      AMI: ami-03f65b8614a860c29
    eu-west-1:
      AMI: ami-0694d931cee176e7d

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 instance type
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium

  KeyName:
    Type: String
    Default: VisionKey
    Description: Name of SSH key pair

Resources:
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref 'InstanceType'
      SecurityGroups:
        - !Ref 'WebServerSecurityGroup'
      KeyName: !Ref 'KeyName'
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      UserData: 
        Fn::Base64: |
          #!/bin/bash
          # Update package list and install dependencies
          sudo apt-get update
          sudo apt-get install -y git curl

          # Install Node.js 18.x
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs

          # Verify installation
          node --version
          npm --version

          # Clone and setup application
          cd /home/ubuntu
          git clone https://github.com/Caraveo/ZiaVision.git
          cd ZiaVision

          # Set permissions
          sudo chown -R ubuntu:ubuntu /home/ubuntu/ZiaVision

          # Install dependencies
          npm install
          cd client
          npm install --legacy-peer-deps
          
          # Build the application
          export CI=false
          npm run build
          cd ..

          # Install PM2 globally
          sudo npm install -g pm2

          # Start the application with PM2
          pm2 start server.js --name "ziavision"
          pm2 save
          
          # Setup PM2 to start on system reboot
          sudo env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu

Outputs:
  WebsiteURL:
    Description: Website URL
    Value: !Sub 'http://${WebServer.PublicDnsName}:3000'

  SSHCommand:
    Description: SSH command
    Value: !Sub 'ssh -i ${KeyName}.pem ubuntu@${WebServer.PublicDnsName}' 