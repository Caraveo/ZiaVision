AWSTemplateFormatVersion: '2010-09-09'
Description: 'Zia Vision Application Infrastructure'

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Environment name
  DeploymentBucketName:
    Type: String
    Default: ziavision-deploy
    Description: Name of the S3 bucket for deployments
  AssetsBucketName:
    Type: String
    Default: ziavision-assets
    Description: Name of the S3 bucket for assets

Resources:
  ApplicationSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Zia Vision application
      VpcId: vpc-02457408d8675ada1  # Default VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-sg

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${DeploymentBucketName}
                  - !Sub arn:aws:s3:::${DeploymentBucketName}/*
                  - !Sub arn:aws:s3:::${AssetsBucketName}
                  - !Sub arn:aws:s3:::${AssetsBucketName}/*

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  ApplicationInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0735c191cf914754d  # Amazon Linux 2 in us-west-2
      SubnetId: subnet-0ff94ad66dba7c86d  # us-west-2a subnet
      SecurityGroupIds:
        - !Ref ApplicationSecurityGroup
      KeyName: aws-eb
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y docker
          service docker start
          usermod -a -G docker ec2-user
          docker pull nginx:latest
          mkdir -p /var/www/html
          aws s3 cp s3://${DeploymentBucketName}/deployment.zip /tmp/
          cd /var/www/html
          unzip /tmp/deployment.zip
          docker run -d -p 80:80 -v /var/www/html:/usr/share/nginx/html nginx:latest
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-instance

  DeploymentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DeploymentBucketName
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-deploy

  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref AssetsBucketName
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-assets

  CPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: CPU utilization greater than 80%
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      Dimensions:
        - Name: InstanceId
          Value: !Ref ApplicationInstance
      ComparisonOperator: GreaterThanThreshold

Outputs:
  WebsiteURL:
    Description: URL of the website
    Value: !Sub http://${ApplicationInstance.PublicDnsName}
  DeploymentBucketName:
    Description: Name of deployment S3 bucket
    Value: !Ref DeploymentBucket
  AssetsBucketName:
    Description: Name of assets S3 bucket
    Value: !Ref AssetsBucket 